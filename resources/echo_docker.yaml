apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-docker
  labels:
    app: echo-docker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-docker
  template:
    metadata:
      labels:
        app: echo-docker
    spec:
      containers:
      - name: echo-docker
        image: echo-docker:1.0.0
        # This overrides the Docker Entrypoint to make it do nothing indefinitely
        command: ["sleep", "infinity"]
